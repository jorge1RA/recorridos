<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RECORRIDOS — Inspector</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --negro:#0a0a0a; --blanco:#f0ede8; --amarillo:#f4a261;
      --amarillo-oscuro:#c47a3a; --rojo:#e63946; --verde:#2d6a4f;
      --verde-claro:#52b788; --gris:#3a3a3a; --gris-claro:#6b6b6b;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overflow:hidden; }
    body { background:var(--negro); color:var(--blanco); font-family:'IBM Plex Sans',sans-serif; }

    /* ── SELECTOR ── */
    #pantalla-selector { height:100vh; display:flex; flex-direction:column; animation:fadeIn 0.4s ease; }
    .cabecera { padding:20px 20px 0; display:flex; align-items:center; justify-content:space-between; }
    .rol-badge { background:rgba(244,162,97,0.15); border:1px solid rgba(244,162,97,0.3); color:var(--amarillo); border-radius:20px; padding:4px 12px; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-weight:600; }
    .btn-salir { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:var(--gris-claro); border-radius:8px; padding:8px 14px; font-size:12px; font-family:'IBM Plex Sans',sans-serif; cursor:pointer; letter-spacing:1px; text-transform:uppercase; }
    .titulo-selector { padding:24px 20px 8px; font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:4px; line-height:1; }
    .subtitulo-selector { padding:0 20px 24px; font-size:13px; color:var(--gris-claro); }
    .lista-recorridos { flex:1; overflow-y:auto; padding:0 20px 20px; display:flex; flex-direction:column; gap:12px; }
    .tarjeta-recorrido { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px 20px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:space-between; }
    .tarjeta-recorrido:active { transform:scale(0.98); background:rgba(244,162,97,0.08); }
    .recorrido-numero { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; color:var(--amarillo); line-height:1; }
    .recorrido-nombre { font-size:15px; font-weight:500; margin:4px 0 2px; }
    .recorrido-meta { font-size:12px; color:var(--gris-claro); }

    /* ── RUTA INSPECTOR ── */
    #pantalla-ruta { height:100vh; flex-direction:column; display:none; }
    .barra-ruta { background:#1a1200; border-bottom:1px solid rgba(244,162,97,0.2); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .ruta-titulo { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; }
    .btn-nueva-incidencia { background:var(--amarillo); color:var(--negro); border:none; border-radius:10px; padding:10px 16px; font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:600; letter-spacing:1px; cursor:pointer; }
    .btn-volver-sel { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); color:var(--blanco); border-radius:10px; width:38px; height:38px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Sans',sans-serif; flex-shrink:0; }
    .btn-volver-sel:active { background:rgba(255,255,255,0.15); }
    .zona-contenedor { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
    .item-contenedor { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:14px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all 0.15s; }
    .item-contenedor:active { background:rgba(244,162,97,0.06); }
    .item-contenedor.ok { border-color:rgba(82,183,136,0.3); }
    .item-contenedor.incidencia { border-color:rgba(244,162,97,0.4); background:rgba(244,162,97,0.05); }
    .cont-num { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:2px; color:var(--amarillo); min-width:48px; }
    .cont-info { flex:1; }
    .cont-calle { font-size:14px; font-weight:500; }
    .cont-nota  { font-size:12px; color:var(--gris-claro); margin-top:2px; }
    .cont-estado { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
    .estado-ok  { background:rgba(82,183,136,0.2); }
    .estado-inc { background:rgba(244,162,97,0.2); }
    .estado-nada { background:rgba(255,255,255,0.06); }
    .barra-inferior { padding:12px 16px; border-top:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.4); flex-shrink:0; }
    .resumen-bar { display:flex; gap:8px; }
    .chip { flex:1; border-radius:10px; padding:10px; text-align:center; font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }
    .chip-ok  { background:rgba(82,183,136,0.1); color:var(--verde-claro); border:1px solid rgba(82,183,136,0.2); }
    .chip-inc { background:rgba(244,162,97,0.1); color:var(--amarillo);   border:1px solid rgba(244,162,97,0.2); }
    .chip-pen { background:rgba(255,255,255,0.04); color:var(--gris-claro); border:1px solid rgba(255,255,255,0.08); }
    .chip-num { font-family:'Bebas Neue',sans-serif; font-size:22px; display:block; letter-spacing:2px; margin-bottom:2px; }

    /* ── MODAL NUEVA INCIDENCIA ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.88); display:none; align-items:flex-end; z-index:100; }
    .modal-overlay.activo { display:flex; }
    .modal { width:100%; background:#111; border-radius:20px 20px 0 0; padding:24px 20px; max-height:90vh; overflow-y:auto; animation:slideUp 0.3s ease; }
    .modal-titulo { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:var(--amarillo); margin-bottom:20px; }

    .campo-modal { margin-bottom:16px; }
    .campo-modal label { display:block; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--gris-claro); margin-bottom:8px; font-weight:500; }
    .campo-modal select, .campo-modal textarea, .campo-modal input {
      width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12);
      border-radius:10px; padding:12px 14px; font-family:'IBM Plex Sans',sans-serif;
      font-size:14px; color:var(--blanco); outline:none; appearance:none;
    }
    .campo-modal select { cursor:pointer; }
    .campo-modal select option { background:#1a1a1a; }
    .campo-modal textarea { resize:none; height:80px; }

    /* Tipos de incidencia */
    .tipos-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .tipo-btn { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:12px 10px; text-align:center; cursor:pointer; transition:all 0.15s; }
    .tipo-btn.seleccionado { background:rgba(244,162,97,0.15); border-color:var(--amarillo); color:var(--amarillo); }
    .tipo-btn:active { transform:scale(0.97); }
    .tipo-icono { font-size:22px; display:block; margin-bottom:4px; }
    .tipo-label { font-size:11px; font-weight:600; letter-spacing:1px; text-transform:uppercase; }

    /* Zona foto */
    .zona-foto { border:2px dashed rgba(255,255,255,0.15); border-radius:12px; padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
    .zona-foto:active { border-color:var(--amarillo); }
    .zona-foto input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .foto-preview { width:100%; border-radius:10px; margin-top:10px; max-height:200px; object-fit:cover; display:none; }
    .foto-icono { font-size:32px; margin-bottom:8px; }
    .foto-texto { font-size:13px; color:var(--gris-claro); }

    .btn-enviar { width:100%; background:var(--amarillo); color:var(--negro); border:none; border-radius:12px; padding:16px; font-family:'IBM Plex Sans',sans-serif; font-size:14px; font-weight:600; letter-spacing:1px; text-transform:uppercase; cursor:pointer; margin-top:8px; }
    .btn-cancelar-modal { width:100%; background:rgba(255,255,255,0.06); color:var(--gris-claro); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; cursor:pointer; margin-top:8px; }

    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  </style>
</head>
<body>

<div id="pantalla-selector">
  <div class="cabecera">
    <div>
      <span class="rol-badge">Inspector</span>
      <div style="font-size:12px;color:var(--gris-claro);margin-top:6px;" id="saludo-nombre">RECORRIDOS</div>
    </div>
    <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
  </div>
  <div class="titulo-selector">SELECCIONA<br>RECORRIDO</div>
  <div class="subtitulo-selector">Elige el recorrido a inspeccionar</div>
  <div class="lista-recorridos" id="lista-recorridos">
    <div style="text-align:center;color:var(--gris-claro);padding:40px 0;font-size:14px;">Cargando...</div>
  </div>
</div>

<div id="pantalla-ruta">
  <div class="barra-ruta">
    <button class="btn-volver-sel" onclick="volverSelectorInspector()" title="Volver al selector">←</button>
    <div style="flex:1">
      <div class="ruta-titulo" id="ruta-titulo-bar">INSPECCIÓN</div>
      <div style="font-size:11px;color:var(--gris-claro);margin-top:2px;" id="ruta-zona-bar"></div>
    </div>
    <button class="btn-nueva-incidencia" onclick="abrirModalIncidencia(null)">+ Incidencia</button>
  </div>

  <div class="zona-contenedor" id="zona-contenedor"></div>

  <div class="barra-inferior">
    <div class="resumen-bar">
      <div class="chip chip-ok"><span class="chip-num" id="cnt-ok">0</span>OK</div>
      <div class="chip chip-inc"><span class="chip-num" id="cnt-inc">0</span>Incidencias</div>
      <div class="chip chip-pen"><span class="chip-num" id="cnt-pen">0</span>Pendientes</div>
    </div>
  </div>
</div>

<!-- MODAL INCIDENCIA -->
<div class="modal-overlay" id="modal-incidencia">
  <div class="modal">
    <div class="modal-titulo">⚠ NUEVA INCIDENCIA</div>

    <div class="campo-modal">
      <label>Tipo de incidencia</label>
      <div class="tipos-grid">
        <div class="tipo-btn" data-tipo="carretera_cortada" onclick="seleccionarTipo(this)">
          <span class="tipo-icono">🚧</span>
          <span class="tipo-label">Carretera cortada</span>
        </div>
        <div class="tipo-btn" data-tipo="basura_fuera" onclick="seleccionarTipo(this)">
          <span class="tipo-icono">🗑</span>
          <span class="tipo-label">Basura fuera</span>
        </div>
        <div class="tipo-btn" data-tipo="muebles_escombros" onclick="seleccionarTipo(this)">
          <span class="tipo-icono">🛋</span>
          <span class="tipo-label">Muebles / escombros</span>
        </div>
        <div class="tipo-btn" data-tipo="contenedor_roto" onclick="seleccionarTipo(this)">
          <span class="tipo-icono">💥</span>
          <span class="tipo-label">Contenedor roto</span>
        </div>
        <div class="tipo-btn" data-tipo="contenedor_mal_estado" onclick="seleccionarTipo(this)">
          <span class="tipo-icono">⚠</span>
          <span class="tipo-label">Mal estado</span>
        </div>
        <div class="tipo-btn" data-tipo="contenedor_fuera_ubicacion" onclick="seleccionarTipo(this)">
          <span class="tipo-icono">📍</span>
          <span class="tipo-label">Fuera de ubicación</span>
        </div>
      </div>
    </div>

    <div class="campo-modal" id="campo-contenedor-ref" style="display:none;">
      <label>Contenedor afectado (opcional)</label>
      <select id="select-contenedor">
        <option value="">-- Sin contenedor específico --</option>
      </select>
    </div>

    <div class="campo-modal">
      <label>Descripción</label>
      <textarea id="descripcion-incidencia" placeholder="Describe la incidencia con detalle..."></textarea>
    </div>

    <div class="campo-modal">
      <label>Foto</label>
      <div class="zona-foto" onclick="document.getElementById('input-foto').click()">
        <input type="file" id="input-foto" accept="image/*" capture="environment" onchange="previsualizarFoto(this)">
        <div class="foto-icono">📷</div>
        <div class="foto-texto">Toca para hacer foto o seleccionar</div>
        <img class="foto-preview" id="foto-preview" alt="Foto incidencia">
      </div>
    </div>

    <button class="btn-enviar" onclick="enviarIncidencia()">Enviar incidencia</button>
    <button class="btn-cancelar-modal" onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyA9PzR5xemmCl4t1ae0GQsSIjSs-bY_Pco",
  authDomain:"recorridos-app-f362a.firebaseapp.com",
  projectId:"recorridos-app-f362a",
  storageBucket:"recorridos-app-f362a.firebasestorage.app",
  messagingSenderId:"375824896184",
  appId:"1:375824896184:web:9d1bcbe4df81e651f9644d"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

let usuarioActual=null, recorridoActual=null, contenedores=[], estadoContenedores={};
let tipoSeleccionado=null, fotoBase64=null, contenedorRefModal=null;

const ETIQUETAS = {
  carretera_cortada:'Carretera cortada', basura_fuera:'Basura fuera del contenedor',
  muebles_escombros:'Muebles o escombros abandonados', contenedor_roto:'Contenedor roto',
  contenedor_mal_estado:'Contenedor en mal estado', contenedor_fuera_ubicacion:'Contenedor fuera de ubicación'
};

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href='../index.html'; return; }
  const snap = await getDoc(doc(db,'usuarios',user.uid));
  if (!snap.exists()||snap.data().rol!=='inspector') { window.location.href='../index.html'; return; }
  usuarioActual={uid:user.uid,...snap.data()};
  document.getElementById('saludo-nombre').textContent=`Hola, ${usuarioActual.nombre||'Inspector'}`;
  cargarRecorridos();
});

async function cargarRecorridos() {
  const lista=document.getElementById('lista-recorridos');
  try {
    const snap=await getDocs(collection(db,'recorridos'));
    if (snap.empty) { lista.innerHTML=`<div style="text-align:center;color:var(--gris-claro);padding:40px 0;">No hay recorridos configurados.</div>`; return; }
    lista.innerHTML='';
    snap.forEach(d=>{
      const r=d.data();
      const div=document.createElement('div');
      div.className='tarjeta-recorrido';
      div.innerHTML=`<div><div class="recorrido-numero">R${r.numero||d.id}</div><div class="recorrido-nombre">${r.nombre||'Recorrido'}</div><div class="recorrido-meta">${(r.contenedores||[]).length} puntos · ${r.zona||''}</div></div><div style="font-size:20px;color:var(--gris-claro)">›</div>`;
      div.onclick=()=>abrirRecorrido(d.id,r);
      lista.appendChild(div);
    });
  } catch(e) { lista.innerHTML=`<div style="text-align:center;color:#e63946;padding:40px 0;">Error al cargar</div>`; }
}

window.abrirRecorrido = function(id, datos) {
  recorridoActual={id,...datos};
  contenedores=datos.contenedores||[];
  estadoContenedores={};
  document.getElementById('ruta-titulo-bar').textContent=`R${datos.numero||id} · INSPECCIÓN`;
  document.getElementById('ruta-zona-bar').textContent=datos.zona||'';
  document.getElementById('pantalla-selector').style.display='none';
  const pr=document.getElementById('pantalla-ruta');
  pr.style.display='flex'; pr.style.flexDirection='column';
  renderContenedores();
};

window.volverSelectorInspector = function() {
  recorridoActual = null;
  contenedores = [];
  estadoContenedores = {};
  document.getElementById('pantalla-ruta').style.display='none';
  document.getElementById('pantalla-selector').style.display='flex';
  cargarRecorridos();
};

function renderContenedores() {
  const zona=document.getElementById('zona-contenedor');
  zona.innerHTML=contenedores.map((c,i)=>{
    const est=estadoContenedores[i];
    let claseItem='item-contenedor', icono='<div class="cont-estado estado-nada">·</div>';
    if (est==='ok')        { claseItem+=' ok';        icono='<div class="cont-estado estado-ok">✓</div>'; }
    if (est==='incidencia'){ claseItem+=' incidencia'; icono='<div class="cont-estado estado-inc">⚠</div>'; }
    return `<div class="${claseItem}" onclick="accionContenedor(${i})">
      <div class="cont-num">${c.numero||i+1}</div>
      <div class="cont-info">
        <div class="cont-calle">${c.calle||'Sin dirección'}</div>
        ${c.nota?`<div class="cont-nota">${c.nota}</div>`:''}
      </div>
      ${icono}
    </div>`;
  }).join('');
  actualizarResumen();
}

function actualizarResumen() {
  const vals=Object.values(estadoContenedores);
  document.getElementById('cnt-ok').textContent=vals.filter(v=>v==='ok').length;
  document.getElementById('cnt-inc').textContent=vals.filter(v=>v==='incidencia').length;
  document.getElementById('cnt-pen').textContent=contenedores.length-vals.length;
}

window.accionContenedor = function(idx) {
  const est=estadoContenedores[idx];
  if (!est) {
    // Primera vez: preguntar estado
    if (confirm(`¿Contenedor ${contenedores[idx]?.numero||idx+1} en ${contenedores[idx]?.calle||''} — ¿está en orden?`)) {
      estadoContenedores[idx]='ok';
      renderContenedores();
    } else {
      contenedorRefModal=idx;
      abrirModalIncidencia(idx);
    }
  } else if (est==='ok') {
    estadoContenedores[idx]=undefined;
    delete estadoContenedores[idx];
    renderContenedores();
  } else {
    contenedorRefModal=idx;
    abrirModalIncidencia(idx);
  }
};

window.abrirModalIncidencia = function(idx) {
  contenedorRefModal=idx;
  tipoSeleccionado=null; fotoBase64=null;
  document.querySelectorAll('.tipo-btn').forEach(b=>b.classList.remove('seleccionado'));
  document.getElementById('descripcion-incidencia').value='';
  document.getElementById('foto-preview').style.display='none';
  document.getElementById('foto-preview').src='';
  // Rellenar selector de contenedores
  const sel=document.getElementById('select-contenedor');
  sel.innerHTML='<option value="">-- Sin contenedor específico --</option>';
  contenedores.forEach((c,i)=>{
    const opt=document.createElement('option');
    opt.value=i; opt.textContent=`${c.numero||i+1} · ${c.calle||''}`;
    if (i===idx) opt.selected=true;
    sel.appendChild(opt);
  });
  document.getElementById('campo-contenedor-ref').style.display='block';
  document.getElementById('modal-incidencia').classList.add('activo');
};

window.cerrarModal = function() {
  document.getElementById('modal-incidencia').classList.remove('activo');
};

window.seleccionarTipo = function(el) {
  document.querySelectorAll('.tipo-btn').forEach(b=>b.classList.remove('seleccionado'));
  el.classList.add('seleccionado');
  tipoSeleccionado=el.dataset.tipo;
};

window.previsualizarFoto = function(input) {
  const file=input.files[0];
  if (!file) return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    fotoBase64=e.target.result;
    const prev=document.getElementById('foto-preview');
    prev.src=fotoBase64; prev.style.display='block';
  };
  reader.readAsDataURL(file);
};

window.enviarIncidencia = async function() {
  if (!tipoSeleccionado) { alert('Selecciona el tipo de incidencia'); return; }
  const desc=document.getElementById('descripcion-incidencia').value.trim();
  const selIdx=document.getElementById('select-contenedor').value;
  const btn=document.querySelector('.btn-enviar');
  btn.disabled=true; btn.textContent='Enviando...';

  try {
    // Obtener geolocalización
    const coords = await new Promise((res)=>{
      navigator.geolocation.getCurrentPosition(
        p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),
        ()=>res(null),{timeout:5000}
      );
    });

    const incidencia = {
      tipo: tipoSeleccionado,
      tipoEtiqueta: ETIQUETAS[tipoSeleccionado]||tipoSeleccionado,
      descripcion: desc||'',
      recorridoId: recorridoActual.id,
      recorridoNombre: recorridoActual.nombre||'',
      contenedorIdx: selIdx!==''?parseInt(selIdx):null,
      contenedorRef: selIdx!==''?(contenedores[parseInt(selIdx)]||null):null,
      inspectorId: usuarioActual.uid,
      inspectorNombre: usuarioActual.nombre||'Inspector',
      foto: fotoBase64||null,
      coords: coords,
      estado: 'pendiente',
      timestamp: serverTimestamp(),
      fechaTexto: new Date().toLocaleString('es-ES')
    };

    await addDoc(collection(db,'incidencias'), incidencia);

    // Marcar contenedor como incidencia en la vista local
    if (selIdx!=='') {
      estadoContenedores[parseInt(selIdx)]='incidencia';
      renderContenedores();
    }

    cerrarModal();
    alert('✓ Incidencia enviada correctamente. El administrador ha sido notificado.');
  } catch(e) {
    alert('Error al enviar la incidencia. Comprueba tu conexión.');
    console.error(e);
  } finally {
    btn.disabled=false; btn.textContent='Enviar incidencia';
  }
};

window.cerrarSesion = async function() {
  await signOut(auth);
  window.location.href='../index.html';
};
</script>
</body>
</html>
